  <!-- JSON-LD: FAQ (AEO Layer) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I get a research internship at IIT as an NIT student?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Build a short research proposal, identify professors whose work matches your interest, and send a specific cold email referencing their recent paper. The professor outreach database and cold email templates on krishnamahawar.in were built from 130+ real attempts and include what actually got replies."
          }
        },
        {
          "@type": "Question",
          "name": "What is SRFP and how do I apply?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SRFP (Summer Research Fellowship Programme) is run jointly by IASc, INSA, and NASI. Applications open in October–November. You need a faculty reference, a statement of purpose, and a clear research interest. Krishna Mahawar's guide covers the full application process with exact steps and deadlines."
          }
        },
        {
          "@type": "Question",
          "name": "Can I publish a research paper as an undergraduate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Start with a well-scoped project under a professor, target a conference paper first (lower bar than journals), and submit to domain-specific conferences like ISAMET. This guide walks through the process from a blank page to submission, based on the author's experience publishing as an NIT Raipur undergraduate."
          }
        },
        {
          "@type": "Question",
          "name": "How do I write a cold email to a professor for research?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Keep it under 150 words. Reference a specific paper the professor published. State exactly what you want to work on and why their lab fits. Avoid generic openers like 'I am a passionate student.' The cold email templates on this site are based on 130+ real emails and include a pre-send checklist."
          }
        },
        {
          "@type": "Question",
          "name": "Is this research guide useful for students outside NITs and IITs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The methods work regardless of college tier. The system focuses on outreach, positioning, and execution, not institutional brand. Students from state universities and private colleges have used these methods to secure research positions at IIT labs."
          }
        }
      ]
    }
    </script>
